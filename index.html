<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecuRadar — Cyber Threat Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>

  <header>
    <div class="header-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>SecuRadar</span>
      </div>
      <span class="source-badge">Threat Intelligence</span>
    </div>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated" title="Last data refresh"></span>
      <span class="pt-pill" id="ptPill"></span>
      <div class="view-toggle">
        <button class="view-btn" id="viewGrid" title="Grid view">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="view-btn" id="viewList" title="List view">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
      <button class="theme-btn" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <section class="stats-bar" id="statsBar">
      <button class="stat-card stat-total" data-severity="All">
        <span class="stat-label">Total</span>
        <span class="stat-value" id="countTotal">—</span>
      </button>
      <button class="stat-card stat-critical" data-severity="Critical">
        <span class="stat-dot"></span>
        <span class="stat-label">Critical</span>
        <span class="stat-value" id="countCritical">—</span>
      </button>
      <button class="stat-card stat-high" data-severity="High">
        <span class="stat-dot"></span>
        <span class="stat-label">High</span>
        <span class="stat-value" id="countHigh">—</span>
      </button>
      <button class="stat-card stat-medium" data-severity="Medium">
        <span class="stat-dot"></span>
        <span class="stat-label">Medium</span>
        <span class="stat-value" id="countMedium">—</span>
      </button>
      <button class="stat-card stat-low" data-severity="Low">
        <span class="stat-dot"></span>
        <span class="stat-label">Low</span>
        <span class="stat-value" id="countLow">—</span>
      </button>
      <button class="stat-card stat-new" data-severity="New">
        <span class="stat-dot"></span>
        <span class="stat-label">New</span>
        <span class="stat-value" id="countNew">—</span>
      </button>
    </section>

    <section class="source-filters" id="sourceFilters"></section>

    <section class="filters-bar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search" placeholder="Search title, summary, vendor, CVE…" autocomplete="off">
      </div>
      <input type="text" id="vendorFilter" placeholder="Vendor" autocomplete="off">
      <input type="text" id="cveFilter"    placeholder="CVE ID"  autocomplete="off">
      <select id="sortBy">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="severity">Severity</option>
      </select>
      <button class="clear-btn" id="clearAll">Clear</button>
    </section>

    <div class="results-bar">
      <span id="resultCount"></span>
      <span class="active-filters" id="activeFilters"></span>
    </div>

    <section class="cards-grid" id="advisoriesGrid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading advisories…</p>
      </div>
    </section>
  </main>

  <div class="panel-overlay" id="panelOverlay"></div>
  <aside class="detail-panel" id="detailPanel">
    <div class="panel-header">
      <div class="panel-badges" id="panelBadges"></div>
      <button class="panel-close" id="panelClose" aria-label="Close">✕</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </aside>

  <script src="assets/js/dashboard.js"></script>
</body>
</html>
